<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Invoice - WA Web Helper</title>
  <link rel="stylesheet" href="invoice.css">
</head>
<body>
  <div class="invoice-container">
    <div class="header">
      <h1>INVOICE / DEAL SUMMARY</h1>
      <p id="invoice-date">Date: </p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th class="right">Qty</th>
          <th class="right">Unit Price</th>
          <th class="right">Amount</th>
        </tr>
      </thead>
      <tbody id="invoice-items">
        <!-- Injected by JS -->
      </tbody>
    </table>

    <div class="totals" id="invoice-totals">
      <!-- Injected by JS -->
    </div>

    <div class="footer">
      <p>Generated by WhatsApp Web Helper Extension</p>
    </div>

    <div class="actions">
      <button class="btn-print" id="btn-print">Print / Save as PDF</button>
    </div>
  </div>

  <script src="invoice.js"></script>
</body>
</html>
